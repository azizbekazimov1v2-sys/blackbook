<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Video</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            padding: 40px;
        }

        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }

        h1 {
            margin-top: 0;
        }

        .btn-row {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        button, a {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }

        button {
            background: #dc2626;
            color: white;
        }

        a {
            background: #e5e7eb;
            color: #111827;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Delete Video</h1>
    <p>Rostdan ham <strong>{{ video.title }}</strong> videoni o‘chirmoqchimisiz?</p>

    <form method="post">
        {% csrf_token %}
        <div class="btn-row">
            <button type="submit">Yes, Delete</button>
            <a href="{% url 'admin_panel' %}">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
